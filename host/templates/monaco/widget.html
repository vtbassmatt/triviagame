<div class="mb-3"><input type="hidden" name="{{ widget.name }}"{% if widget.value != None %} value="{{ widget.value|stringformat:'s' }}"{% endif %}{% include "django/forms/widgets/bs5_attrs.html" %}><div class="p-1 border border-light-subtle rounded"><div class="ratio ratio-21x9"><iframe onload="javascript:wireUpMonaco('{{ widget.name }}',this)" id="monaco-{{ widget.name }}" src="{% url 'monaco_iframe' %}?code={% if widget.value %}{{ widget.value|stringformat:'s'|urlencode }}{% endif %}&lang=markdown&minimap=false&contextmenu=false&lineNumbers=off&folding=false&context={{ widget.name }}"></iframe></div>{#<small class="text-body-tertiary">Ctrl-M (Shift-Ctrl-M on macOS) toggles Tab key behavior</small>#}</div></div>
