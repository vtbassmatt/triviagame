{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <script>self["MonacoEnvironment"] = (function (paths) {
          return {
            globalAPI: false,
            getWorkerUrl : function (moduleId, label) {
              var result =  paths[label];
              if (/^((http:)|(https:)|(file:)|(\/\/))/.test(result)) {
                var currentUrl = String(window.location);
                var currentOrigin = currentUrl.substr(0, currentUrl.length - window.location.hash.length - window.location.search.length - window.location.pathname.length);
                if (result.substring(0, currentOrigin.length) !== currentOrigin) {
                  var js = '/*' + label + '*/importScripts("' + result + '");';
                  var blob = new Blob([js], { type: 'application/javascript' });
                  return URL.createObjectURL(blob);
                }
              }
              return result;
            }
          };
        })({
  "editorWorkerService": "{% static 'monaco/editor.worker.bundle.js' %}",
  "css": "{% static 'monaco/css.worker.bundle.js' %}",
  "html": "{% static 'monaco/html.worker.bundle.js' %}",
  "json": "{% static 'monaco/json.worker.bundle.js' %}",
  "typescript": "{% static 'monaco/ts.worker.bundle.js' %}",
  "javascript": "{% static 'monaco/ts.worker.bundle.js' %}",
  "less": "{% static 'monaco/css.worker.bundle.js' %}",
  "scss": "{% static 'monaco/css.worker.bundle.js' %}",
  "handlebars": "{% static 'monaco/html.worker.bundle.js' %}",
  "razor": "{% static 'monaco/html.worker.bundle.j' %}s"
});</script>
